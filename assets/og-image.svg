<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Local Foundary — digital growth for local businesses</title>
  <desc id="desc">Local Foundary wordmark and connected online presence graphic on a dark navy background.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#05060a"/><stop offset=".58" stop-color="#0b0e17"/><stop offset="1" stop-color="#17102c"/></linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#42f3ff"/><stop offset=".55" stop-color="#745cff"/><stop offset="1" stop-color="#ff47c8"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
